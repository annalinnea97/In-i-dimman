<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slumpgalleri</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial;
    color:white;
    user-select:none;
}

#start{
    text-align:center;
}

button{
    padding:12px 18px;
    font-size:16px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

img{
    max-width:100vw;
    max-height:100vh;
    object-fit:contain;
    opacity:0;
    transition:opacity .3s ease;
}

#hint{
    position:fixed;
    bottom:10px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div id="start">
    <h2>📸 Slumpgalleri</h2>
    <button id="add">Lägg till bilder</button>
    <p>Tryck sedan på skärmen för slumpbild</p>
</div>

<input type="file" id="file" accept="image/*" multiple style="display:none">

<img id="img">

<div id="hint">Klicka var som helst = ny bild</div>

<script>
// ---------- IndexedDB ----------
let db;
const request = indexedDB.open("galleryDB", 1);

request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("images", { keyPath: "id", autoIncrement:true });
};

request.onsuccess = e => {
    db = e.target.result;
    loadImages();
};

// ---------- Save ----------
function saveImage(dataURL){
    const tx = db.transaction("images","readwrite");
    tx.objectStore("images").add({data:dataURL});
}

// ---------- Load ----------
function loadImages(){
    const tx = db.transaction("images","readonly");
    const store = tx.objectStore("images");

    const req = store.getAll();

    req.onsuccess = () => {
        images = req.result.map(i => i.data);
    };
}

// ---------- UI ----------
const fileInput = document.getElementById("file");
const start = document.getElementById("start");
const img = document.getElementById("img");

let images = [];
let bag = [];

document.getElementById("add").onclick = () => {
    fileInput.click();
};

fileInput.onchange = async (e) => {
    const files = [...e.target.files];

    for(const f of files){
        const reader = new FileReader();
        reader.onload = () => {
            saveImage(reader.result);
            images.push(reader.result);
        };
        reader.readAsDataURL(f);
    }

    start.style.display = "none";
    img.style.display = "block";
};

// ---------- Shuffle bag (ingen upprepning förrän alla visats) ----------
function refillBag(){
    bag = [...Array(images.length).keys()];
}

function nextImage(){
    if(images.length === 0) return;

    if(bag.length === 0) refillBag();

    const i = Math.floor(Math.random() * bag.length);
    const idx = bag.splice(i,1)[0];

    img.style.opacity = 0;

    setTimeout(() => {
        img.src = images[idx];
        img.onload = () => img.style.opacity = 1;
    }, 150);
}

// ---------- Click ----------
document.body.addEventListener("click", () => {
    if(images.length > 0){
        start.style.display = "none";
        img.style.display = "block";
        nextImage();
    }
});
</script>

</body>
</html>
