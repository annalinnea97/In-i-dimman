<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In i dimman</title>

<style>
body{
    margin:0;
    background:#0e0e0e;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

img{
    max-width:100vw;
    max-height:100vh;
    object-fit:contain;
    opacity:0;
    transition:opacity 0.35s ease;
}

#hint{
    position:fixed;
    bottom:10px;
    color:white;
    font-size:12px;
    opacity:0.5;
    font-family:Arial;
    pointer-events:none;
}
</style>
</head>

<body>

<img id="img">

<div id="hint"></div>

<script>

const TOTAL_BILDER = 50;

// alla bilder är PNG
let bilder = Array.from(
    {length: TOTAL_BILDER},
    (_, i) => `bilder/${i+1}.png`
);

const startBild = "bilder/start.png";

let deck = [];

const img = document.getElementById("img");

// Fisher-Yates shuffle
function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// fyll kortlek
function refillDeck(){
    deck = shuffle([...Array(bilder.length).keys()]);
}

// visa bild
function show(src){
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = src;
    }, 150);
}

// nästa slumpbild
function nextImage(){

    if(deck.length === 0){
        refillDeck();
    }

    const index = deck.pop();
    show(bilder[index]);
}

// när bild laddar → fade in
img.onload = () => {
    img.style.opacity = 1;
};

// klick = nästa bild
document.body.addEventListener("click", nextImage);

// START: alltid start.png först
img.src = startBild;
img.onload = () => {
    img.style.opacity = 1;
    refillDeck();
};

</script>

</body>
</html>
