<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slumpgalleri</title>

<style>
body{
    margin:0;
    background:#0e0e0e;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

img{
    max-width:100vw;
    max-height:100vh;
    object-fit:contain;
    opacity:0;
    transition:opacity 0.35s ease;
}

#hint{
    position:fixed;
    bottom:10px;
    color:white;
    font-size:12px;
    opacity:0.5;
    font-family:Arial;
    pointer-events:none;
}
</style>
</head>

<body>

<img id="img" src="">
<div id="hint">Tryck på skärmen för nästa bild</div>

<script>

const TOTAL_BILDER = 50;

// skapar lista: 1.jpg ... 50.jpg
let bilder = Array.from({length: TOTAL_BILDER}, (_, i) => `bilder/${i+1}.jpg`);

let deck = [];
let current = -1;

const img = document.getElementById("img");

// blanda (Fisher-Yates shuffle)
function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// fyll "kortlek"
function refillDeck(){
    deck = shuffle([...Array(bilder.length).keys()]);
}

// visa nästa bild
function nextImage(){

    if(deck.length === 0){
        refillDeck(); // alla bilder visade → börja om
    }

    const index = deck.pop();
    const src = bilder[index];

    img.style.opacity = 0;

    setTimeout(() => {
        img.src = src;
    }, 150);
}

// när bilden laddat → fade in
img.onload = () => {
    img.style.opacity = 1;
};

// klick = nästa bild
document.body.addEventListener("click", nextImage);

// starta direkt
refillDeck();
nextImage();

</script>

</body>
</html>
